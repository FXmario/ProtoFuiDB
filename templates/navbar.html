<div class="navbar glass border-b border-base-300 px-4 sticky top-0 z-30">
    <div class="flex-none">
        <button type="button" onclick="toggleSidebar()" class="btn btn-square btn-ghost" aria-label="Toggle sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-6 h-6 stroke-current">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
        </button>
    </div>
    <div class="flex-1 flex gap-2 overflow-x-auto py-2 px-2">
        {% for db in databases %}
        <a class="flex items-center gap-2 px-3 py-1.5 rounded-lg border text-sm font-medium whitespace-nowrap transition-all hover:bg-base-200 hover:border-primary-soft {% if database.public_id == db.public_id %}bg-primary-soft border-primary-soft text-primary{% else %}border-base-300 text-base-content/70 bg-base-100/50{% endif %}"
           hx-get="{% url 'database-detail' db.public_id %}"
           hx-target="#dashboard-content"
           hx-select="#dashboard-content"
           hx-select-oob="#dashboard-sidebar"
           hx-swap="outerHTML"
           hx-push-url="true">
            <span class="w-2 h-2 rounded-full shrink-0 {% if db.provider == 'django.db.backends.postgresql' %}provider-postgres-dot{% elif db.provider == 'django.db.backends.mysql' %}provider-mysql-dot{% else %}provider-sqlite-dot{% endif %}"></span>
            {{ db.name }}
        </a>
        {% empty %}
        <span class="text-base-content/50 text-sm">No databases connected</span>
        {% endfor %}
    </div>
    <div class="flex-none flex items-center gap-2">
        <a
            hx-get="{% url 'database-create' %}"
            hx-target="#dashboard-content"
            hx-select="#dashboard-content"
            class="btn btn-square btn-ghost"
            aria-label="Add database"
        >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-5 h-5 stroke-current">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
        </a>
        <button type="button" onclick="toggleTheme()" class="btn btn-square btn-ghost" aria-label="Toggle theme">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-5 h-5 stroke-current">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
            </svg>
        </button>
        {% include "core/user_menu.html" %}
    </div>
</div>
