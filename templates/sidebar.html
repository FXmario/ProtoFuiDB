<aside class="menu p-4 w-64 min-h-full bg-base-100 border-r border-base-300 flex flex-col">
    <div class="flex items-center justify-between mb-6">
        <a
            hx-get="{% url 'index' %}"
            hx-target="#dashboard-content"
            hx-select="#dashboard-content"
            hx-select-oob="#dashboard-sidebar"
            hx-swap="outerHTML"
            hx-push-url="true"
            class="flex items-center gap-2 text-xl font-bold tracking-tight hover:text-primary transition-colors"
            type="button"
        >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-7 h-7">
                <path d="M12 3C7.029 3 3 7.029 3 12c0 4.97 4.029 9 9 9s9-4.03 9-9c0-4.971-4.029-9-9-9zm0 2c.828 0 1.5.672 1.5 1.5S12.828 8 12 8s-1.5-.672-1.5-1.5S11.172 5 12 5zm-3.5 4h7a1 1 0 110 2h-2.5v5.5a1 1 0 11-2 0V11H8.5a1 1 0 110-2z"/>
            </svg>
            FuiDB
        </a>
        <label for="db-drawer" class="btn btn-ghost btn-square btn-sm lg:hidden">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="inline-block w-5 h-5 stroke-current">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </label>
    </div>

    <div class="mb-4 flex-1 overflow-y-auto">
        <h3 class="text-xs font-bold uppercase tracking-wider text-base-content/50 mb-2 px-3">
            {% if database %}
                Tables — {{ database.name }}
            {% else %}
                Tables
            {% endif %}
        </h3>

        <div id="sidebar-tables">
            {% include "Databases/partials/sidebar_table_list.html" %}
        </div>
    </div>

    <div class="mt-auto pt-4 border-t border-base-300">
        <p class="text-xs text-base-content/50 px-3">FuiDB v0.1.0</p>
    </div>
</aside>
