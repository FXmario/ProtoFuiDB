{% if error %}
    <div class="px-4 py-3">
        <div class="alert alert-error alert-soft">
            <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-5 w-5" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
            <div>
                <h3 class="font-bold text-sm">Query error</h3>
                <pre class="text-xs whitespace-pre-wrap mt-1 text-error/80">{{ error }}</pre>
            </div>
        </div>
    </div>
{% elif columns %}
    <div class="px-4 py-2">
        <div class="flex items-center gap-2 mb-2 text-xs text-base-content/50">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="w-3.5 h-3.5 stroke-current" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2m2 2v-4m2 4v-6m2 6v-8M5 9l7-7 7 7M5 9h14M5 9v10a1 1 0 001 1h12a1 1 0 001-1V9"></path></svg>
            Results
            <span class="badge badge-sm badge-ghost">{{ rows|length }} row{{ rows|length|pluralize }}</span>
        </div>
    </div>
    <div class="overflow-x-auto max-h-80 overflow-y-auto">
        <table class="table table-zebra table-sm w-full">
            <thead class="sticky top-0 bg-base-100">
                <tr>
                    {% for col in columns %}
                    <th class="font-bold">{{ col }}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr>
                    {% for cell in row %}
                    <td class="font-mono text-xs">{{ cell }}</td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% else %}
    <div class="px-4 py-8 text-center text-base-content/40 text-sm">
        No results to display.
    </div>
{% endif %}
