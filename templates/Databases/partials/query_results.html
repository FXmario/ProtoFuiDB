{% if error %}
    <div class="alert alert-error alert-soft">
        <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        <div>
            <h3 class="font-bold">Query error</h3>
            <pre class="text-sm whitespace-pre-wrap">{{ error }}</pre>
        </div>
    </div>
{% elif columns %}
    <div class="overflow-x-auto">
        <table class="table table-zebra table-sm w-full">
            <thead>
                <tr>
                    {% for col in columns %}
                    <th>{{ col }}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for row in rows %}
                <tr>
                    {% for cell in row %}
                    <td>{{ cell }}</td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <p class="text-xs text-base-content/50 mt-2">{{ rows|length }} row{{ rows|length|pluralize }}</p>
{% else %}
    <p class="text-base-content/70">No results.</p>
{% endif %}
