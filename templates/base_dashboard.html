{% extends "base.html" %}

{% block layout %}
<div class="drawer min-h-screen" id="dashboard-drawer">
    <input id="db-drawer" type="checkbox" class="drawer-toggle" />
    <div class="drawer-content flex flex-col animate-fade-in">
        {% block topbar %}{% endblock %}
        <main id="main-content" class="flex-1 p-6 bg-base-200">
            {% block dashboard_content %}{% endblock %}
        </main>
    </div>
    <div class="drawer-side z-40">
        <label for="db-drawer" aria-label="close sidebar" class="drawer-overlay"></label>
        {% include "sidebar.html" %}
    </div>
</div>

<script>
    (function () {
        const drawer = document.getElementById("dashboard-drawer");
        const checkbox = document.getElementById("db-drawer");
        if (!drawer || !checkbox) return;

        const mql = window.matchMedia("(min-width: 1024px)");
        const stored = localStorage.getItem("fuidb-sidebar");
        const openOnDesktop = stored !== "closed";

        function apply() {
            if (mql.matches) {
                checkbox.checked = openOnDesktop;
                drawer.classList.toggle("lg:drawer-open", openOnDesktop);
            } else {
                drawer.classList.remove("lg:drawer-open");
            }
        }

        apply();
        mql.addEventListener("change", apply);

        window.toggleSidebar = function () {
            const isOpen = checkbox.checked;
            checkbox.checked = !isOpen;
            if (mql.matches) {
                drawer.classList.toggle("lg:drawer-open", !isOpen);
                localStorage.setItem("fuidb-sidebar", isOpen ? "closed" : "open");
            }
        };
    })();
</script>
{% endblock %}
