{% extends "base_dashboard.html" %}

{% block title %}Password Changed - FuiDB{% endblock %}

{% block topbar %}
{% include "navbar.html" %}
{% endblock %}

{% block dashboard_content %}
<div class="max-w-xl mx-auto animate-slide-up">
    <div class="card surface-elevated-strong rounded-2xl">
        <div class="card-body items-center text-center">
            <div class="w-16 h-16 rounded-full bg-success/20 flex items-center justify-center mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" class="w-8 h-8 stroke-success stroke-2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h1 class="card-title text-2xl font-bold">Password Changed</h1>
            <p class="text-base-content/70 mt-2">Your password has been changed successfully.</p>
            <div class="card-actions mt-6">
                <a
                    href="{% url 'user-detail' %}"
                    hx-get="{% url 'user-detail' %}"
                    hx-target="#main-content"
                    hx-select="#main-content"
                    class="btn btn-primary"
                >Back to User Detail</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
