{% if user.is_authenticated %}
<!-- Hidden logout form outside dropdown -->
<form id="logout-form" method="post" action="{% url 'logout' %}" class="hidden" hx-boost="false">
    {% csrf_token %}
</form>

<div class="dropdown dropdown-end">
    <div tabindex="0" role="button" class="btn btn-ghost btn-circle avatar placeholder">
        <div class="bg-primary text-primary-content w-10 rounded-full">
            <span class="text-lg">{{ user.username|first|upper }}</span>
        </div>
    </div>
    <ul tabindex="0" class="dropdown-content menu bg-base-100 rounded-box z-[1] w-52 p-2 shadow">
        <li>
            <a
                href="{% url 'user-detail' %}"
                hx-get="{% url 'user-detail' %}"
                hx-target="#main-content"
                hx-select="#main-content"
            >User Detail</a>
        </li>
        <li>
            <a href="{% url 'database-create' %}"
                hx-get="{% url 'database-create' %}"
                hx-target="#dashboard-content"
                hx-select="#dashboard-content"
            >Add Database</a>
        </li>
        <li>
            <button type="button" onclick="document.getElementById('logout-form').submit()" class="w-full text-left">Logout</button>
        </li>
    </ul>
</div>
{% else %}
<a href="{% url 'login' %}" class="btn btn-sm btn-outline">Login</a>
{% endif %}
